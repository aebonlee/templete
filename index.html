<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- [수정] 사이트 설명 -->
    <meta name="description" content="DreamIT Biz - 사이트 설명을 입력하세요" />
    <meta name="author" content="DreamIT Biz" />
    <meta name="theme-color" content="#0046C8" />
    <meta name="robots" content="index, follow" />
    <!-- [수정] 배포 도메인 (site.ts의 url과 동일) -->
    <link rel="canonical" href="https://new-site.dreamitbiz.com/" />
    <meta property="og:url" content="https://new-site.dreamitbiz.com" />
    <meta property="og:type" content="website" />
    <!-- [수정] OG 타이틀/설명 -->
    <meta property="og:title" content="새 사이트 - DreamIT Biz" />
    <meta property="og:description" content="사이트 설명을 입력하세요" />
    <meta property="og:image" content="https://new-site.dreamitbiz.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="DreamIT Biz" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="새 사이트 - DreamIT Biz" />
    <meta name="twitter:description" content="사이트 설명을 입력하세요" />
    <meta name="twitter:image" content="https://new-site.dreamitbiz.com/og-image.png" />
    <!-- [수정] 브라우저 탭 제목 -->
    <title>DreamIT New Site | 드림아이티 새 사이트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script src="https://cdn.iamport.kr/v1/iamport.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
